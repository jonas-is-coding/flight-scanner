<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flight Deal Radar</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #09090b;
      color: #fafafa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.2), transparent 32rem),
        radial-gradient(circle at 80% 20%, rgba(14, 165, 233, 0.18), transparent 28rem),
        #09090b;
      padding: 48px 20px;
    }

    main {
      width: min(1040px, 100%);
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 32px;
    }

    .eyebrow {
      color: #86efac;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      margin: 0 0 12px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 0.95;
      margin: 0;
      max-width: 780px;
    }

    .subtitle {
      color: #d4d4d8;
      font-size: 1.15rem;
      line-height: 1.7;
      margin: 20px 0 0;
      max-width: 680px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      overflow: hidden;
      background: rgba(24, 24, 27, 0.86);
      border: 1px solid rgba(63, 63, 70, 0.86);
      border-radius: 22px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.28);
      padding: 22px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.12), transparent 46%);
      pointer-events: none;
    }

    .card > * {
      position: relative;
    }

    .price {
      color: #22c55e;
      font-size: 2.45rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 12px;
    }

    .route {
      font-size: 1.45rem;
      font-weight: 800;
      margin: 0 0 14px;
    }

    .meta {
      color: #d4d4d8;
      line-height: 1.6;
      margin: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(134, 239, 172, 0.28);
      border-radius: 999px;
      color: #bbf7d0;
      font-size: 0.9rem;
      font-weight: 700;
      margin-top: 18px;
      padding: 8px 12px;
    }

    .empty,
    .error {
      background: rgba(24, 24, 27, 0.86);
      border: 1px dashed #3f3f46;
      border-radius: 22px;
      color: #d4d4d8;
      padding: 28px;
    }

    .error {
      border-color: rgba(248, 113, 113, 0.65);
      color: #fecaca;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="title">
      <p class="eyebrow">NRW Wochenendtrips</p>
      <h1 id="title">Flight Deal Radar</h1>
      <p class="subtitle">
        Günstige Donnerstag-bis-Sonntag-Flüge ab DUS, CGN, DTM und PAD nach Istanbul,
        Athen, Neapel und Thessaloniki — automatisch per Amadeus API aktualisiert.
      </p>
    </section>

    <section id="deals" class="grid" aria-live="polite">
      <article class="empty">Deals werden geladen …</article>
    </section>
  </main>

  <script>
    const formatter = new Intl.NumberFormat("de-DE", {
      style: "currency",
      currency: "EUR",
      maximumFractionDigits: 0,
    });

    const dateFormatter = new Intl.DateTimeFormat("de-DE", {
      weekday: "short",
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
    });

    function text(value) {
      return document.createTextNode(value ?? "");
    }

    function formatDate(value) {
      return dateFormatter.format(new Date(`${value}T00:00:00`));
    }

    function renderDeal(deal) {
      const card = document.createElement("article");
      card.className = "card";

      const price = document.createElement("div");
      price.className = "price";
      price.append(text(formatter.format(deal.price)));

      const route = document.createElement("h2");
      route.className = "route";
      route.append(text(`${deal.origin} → ${deal.destination}`));

      const dates = document.createElement("p");
      dates.className = "meta";
      dates.append(text(`${formatDate(deal.departure)} bis ${formatDate(deal.return)}`));

      const airline = document.createElement("div");
      airline.className = "pill";
      airline.append(text(`✈ Airline: ${deal.airline}`));

      card.append(price, route, dates, airline);
      return card;
    }

    async function loadDeals() {
      const container = document.getElementById("deals");

      try {
        const response = await fetch("../data/deals.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const deals = await response.json();
        container.replaceChildren();

        if (deals.length === 0) {
          const empty = document.createElement("article");
          empty.className = "empty";
          empty.append(text("Keine günstigen Deals unter 160 € gefunden."));
          container.append(empty);
          return;
        }

        container.append(...deals.map(renderDeal));
      } catch (error) {
        const message = document.createElement("article");
        message.className = "error";
        message.append(text(`Deals konnten nicht geladen werden: ${error.message}`));
        container.replaceChildren(message);
      }
    }

    loadDeals();
  </script>
</body>
</html>
